# Deploy no GitHub Pages — publica o site estático a cada push na main.
#
# O projeto não tem build (HTML/CSS/JS vanilla), então o "deploy" é só
# empacotar a raiz do repositório e entregar ao Pages. Para ativar:
# Settings → Pages → Source: "GitHub Actions" (uma vez só).
name: deploy-pages

on:
  push:
    # Branch de desenvolvimento atual + main (para quando houver merge).
    branches: [main, claude/quirky-maxwell-vrwsbg]
  # Permite disparar manualmente pela aba Actions.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Um deploy por vez; um push novo cancela o anterior ainda na fila.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          # Sem build: a raiz do repositório É o site.
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
