<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>O Templo — Fase 1 (cômodo vazio)</title>
  <!-- Three.js vendorado localmente, resolvido por import map (offline). -->
  <script type="importmap">
    { "imports": { "three": "./js/vendor/three.module.js" } }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #d8cdb8; }
    #galeria { width: 100vw; height: 100vh; display: block; }
  </style>
</head>
<body>
  <canvas id="galeria"></canvas>
  <script type="module">
    import { criarGaleria, instalarNavegacao } from './js/galeria.js';
    const canvas = document.getElementById('galeria');
    const g = criarGaleria(canvas);
    const reduz = matchMedia('(prefers-reduced-motion: reduce)').matches;
    const nav = instalarNavegacao(canvas, g, reduz);
    addEventListener('resize', () => g.redimensionar());

    // ?hora=HH:MM força o horário para validar o ciclo de luz; sem isso,
    // usa o relógio real (Fase 3).
    const horaForcada = new URLSearchParams(location.search).get('hora');
    function agora() {
      if (!horaForcada) return new Date();
      const [hh, mm] = horaForcada.split(':');
      const d = new Date();
      d.setHours(+hh || 0, +mm || 0, 0, 0);
      return d;
    }

    let anterior = null;
    function loop(t) {
      const dt = anterior === null ? 0 : Math.min((t - anterior) / 1000, 1 / 30);
      anterior = t;
      nav.atualizar(dt);
      g.atualizarLuz(agora(), dt); // Fase 3: luz viva por hora
      g.render();
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>
</body>
</html>
