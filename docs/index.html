<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <!-- user-scalable=no + touch-action:none (no CSS) evitam zoom e scroll
       acidentais durante os gestos de pintura no celular. -->
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>墨流し — suminagashi</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- O canvas é o protagonista: tela cheia, tudo o mais flutua sobre ele. -->
  <canvas id="agua"></canvas>

  <h1 id="titulo">墨流し <span>suminagashi</span></h1>

  <p id="dica">toque para pingar · arraste para mover a tinta</p>

  <nav id="barra" aria-label="ferramentas">
    <div id="paleta"><!-- swatches montados pelo main.js --></div>
    <div id="divisor" role="presentation"></div>
    <button id="lavar">lavar</button>
  </nav>

  <!-- Editor de cor de um swatch (abre com long-press). O <input
       type="color"> nativo é o seletor: zero dependências. -->
  <div id="editor-cor" hidden>
    <label class="trocar">trocar cor
      <input type="color" id="entrada-cor">
    </label>
    <button id="restaurar-cor" hidden>restaurar padrão</button>
  </div>

  <!-- Mensagem do fim do ritual de entrada. -->
  <p id="aviso" hidden>este é o seu lugar.</p>

  <!-- Selo da fundação: miniatura da primeira pintura, que veste o site. -->
  <button id="selo" hidden aria-label="a sua fundação">
    <img id="selo-img" alt="">
  </button>
  <div id="popover-selo" hidden>
    <button id="refazer-ritual">refazer o ritual</button>
    <button id="fechar-selo">fechar</button>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
