<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <!-- user-scalable=no + touch-action:none (no CSS) evitam zoom e scroll
       acidentais durante os gestos de pintura no celular. -->
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>墨流し — suminagashi</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Three.js (a galeria 3D) VENDORADO localmente, resolvido por import
       map — abre offline. O ateliê não usa Three.js; ele é carregado sob
       demanda (import dinâmico) só ao abrir o templo. -->
  <script type="importmap">
    { "imports": { "three": "./js/vendor/three.module.js" } }
  </script>
</head>
<body class="ocioso">
  <!-- O canvas é o protagonista: tela cheia, tudo o mais flutua sobre ele. -->
  <canvas id="agua"></canvas>

  <!-- Atmosfera: a luz da sala. Um único overlay por cima de tudo
       (água, UI, estante), pointer-events:none, compositing normal —
       barato. O gradiente é definido pelo sistema de luz (js/luz.js). -->
  <div id="atmosfera" aria-hidden="true"></div>

  <!-- Título vertical, à moda dos kakemono. Discretíssimo, no canto. -->
  <h1 id="titulo" lang="ja">墨流し</h1>

  <!-- Convite/dica efêmera: some após a primeira interação. -->
  <p id="convite"></p>

  <!-- Aba da estante: a "lombada" de um pergaminho espiando na margem
       direita. Puxá-la abre o tokonoma. -->
  <button id="aba-estante" aria-label="abrir a estante">
    <span class="lombada"></span>
  </button>

  <!-- Ferramentas: emergem ao tocar a água, recuam após inatividade.
       Sem cápsula branca — as cores "descansam na superfície". -->
  <div id="ferramentas" aria-label="ferramentas">
    <!-- alternador de modo água ↔ cosmos (símbolo discreto) -->
    <button id="alternar-modo" aria-label="alternar modo"></button>
    <div id="paleta"><!-- gotas-cor montadas pelo main.js --></div>
    <div class="acoes">
      <button id="lavar">lavar</button>
      <button id="guardar">guardar</button>
    </div>
  </div>

  <!-- Editor de cor de um swatch (abre com long-press). O <input
       type="color"> nativo é o seletor: zero dependências. -->
  <div id="editor-cor" hidden>
    <label class="trocar">trocar cor
      <input type="color" id="entrada-cor">
    </label>
    <button id="restaurar-cor" hidden>restaurar padrão</button>
  </div>

  <!-- A sequência de guardar desenha aqui: o pergaminho (imagem da obra
       capturada) e o selo hanko. Ambos preenchidos/animados pelo main.js. -->
  <div id="cena-guardar" hidden aria-hidden="true">
    <div id="pergaminho"><img id="pergaminho-img" alt=""></div>
    <div id="hanko">印</div>
  </div>

  <!-- Mensagem cerimonial do fim do ritual de entrada. -->
  <p id="aviso" hidden>esta sala é sua.</p>

  <!-- Estante (tokonoma): expõe UMA obra por vez. Conteúdo montado pelo
       main.js a partir de estante.v1. -->
  <section id="estante" hidden aria-label="estante">
    <button id="fechar-estante" aria-label="fechar a estante">✕</button>
    <button class="navegar anterior" aria-label="obra anterior">‹</button>
    <figure id="obra-foco">
      <div id="moldura"><img id="obra-img" alt=""></div>
      <figcaption>
        <span id="obra-nome"></span>
        <p id="obra-haiku" hidden></p>
        <span id="obra-meta"></span>
      </figcaption>
      <div id="acoes-obra">
        <button id="renomear-obra">renomear</button>
        <button id="exportar-obra">exportar</button>
        <button id="apagar-obra">apagar</button>
      </div>
    </figure>
    <button class="navegar proxima" aria-label="próxima obra">›</button>
    <p id="estante-vazia" hidden>a estante ainda está vazia.</p>
  </section>

  <!-- O TEMPLO (galeria 3D). Canvas separado do ateliê; só é montado ao
       abrir a estante. A UI 2D sobreposta é discreta: voltar ao ateliê e o
       rótulo (nome + haiku) que surge ao se aproximar de uma obra. -->
  <canvas id="galeria-canvas" hidden></canvas>
  <div id="galeria-ui" hidden>
    <button id="voltar-atelie" aria-label="voltar ao ateliê (pintar)">墨</button>
    <div id="rotulo-obra" hidden>
      <span id="rotulo-nome"></span>
      <p id="rotulo-haiku"></p>
    </div>
    <!-- Ao FOCAR uma obra (clique): o poema em japonês (caligrafia vertical)
         logo abaixo do quadro e uma "janelinha" com a tradução em PT. -->
    <div id="foco-obra" hidden>
      <button id="foco-fechar" aria-label="afastar do quadro">✕</button>
      <p id="foco-poema-ja" lang="ja"></p>
      <div id="foco-traducao">
        <span class="rotulo-traducao">tradução</span>
        <p id="foco-poema-pt"></p>
      </div>
    </div>
    <p id="galeria-vazia" hidden>guarde uma pintura para o templo nascer.</p>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
